openai:
  api-key: ${OPENAI_API_KEY:NO_KEY}
  model:
    analysis: gpt-4o-mini
    chat: gpt-4o-mini
    diary-generate: gpt-4o
    report: gpt-4o-mini
    letter: gpt-4o-mini
  base-url: https://api.openai.com/v1

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_TO_256BIT_SECRET_CHANGE_ME_TO_256BIT_SECRET}
  access-exp-seconds: 900        # 15분
  refresh-exp-seconds: 1209600   # 14일

image:
  upload-dir: ${user.home}/here-we-go/images  # S3 전환 시 이 설정 제거

logging:
  level:
    hwan.project2.security.jwt: DEBUG

app:
  frontend-url: http://localhost:5173

server:
  servlet:
    session:
      cookie:
        same-site: lax

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/emolens?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET} 
            scope:
              - openid
              - profile
              - email
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
            client-name: Naver
            scope:
              - name
              - email
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            client-name: Kakao
            scope:
              - profile_nickname
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
