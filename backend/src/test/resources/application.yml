openai:
  api-key: test-api-key-not-real
  model:
    analysis: gpt-4o-mini
    chat: gpt-4o-mini
    diary-generate: gpt-4o
    report: gpt-4o-mini
    letter: gpt-4o-mini
  base-url: http://localhost:9999  # 테스트에서 실제 호출 안 함

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-padding
  access-exp-seconds: 900
  refresh-exp-seconds: 1209600

image:
  upload-dir: ${java.io.tmpdir}/emolens-test-images

spring:
  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - openid
              - profile
              - email
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
            client-name: Naver
            scope:
              - name
              - email
          kakao:
            client-id: test-kakao-client-id
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            client-name: Kakao
            scope:
              - profile_nickname
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
